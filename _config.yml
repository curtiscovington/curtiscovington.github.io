# Site settings
title: "Curtis Covington"
email: curtis.covington@gmail.com
description: >-
  Curtis Covington builds reproducible ML experiments and the tools around them—mostly interpretability work on open models, with clear methodology, measurable results, and runnable artifacts.
url: "https://curtiscovington.com"
baseurl: ""
permalink: /posts/:slug/

# Social preview image (used for Open Graph / Twitter cards)
og_image: "/img/social/site-preview-card-brand-v2.jpg"

# Build settings
plugins:
  - jekyll-feed

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"

feed:
  path: feed.xml
